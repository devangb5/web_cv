<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devang Bhagat - Portfolio</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-BZXSS29NVH"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel standalone for in-browser JSX compiling -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Import Maps to load React and Icons directly in the browser -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",

    }
  </script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <!-- The React Application -->
<script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Mail, FileText, ChevronRight, BookOpen, 
      ExternalLink, Map, Camera, Coffee, ArrowDown, User, Atom 
    } from 'lucide-react';

    function App() {
      const [activeSection, setActiveSection] = useState('home');
      const [isScrolled, setIsScrolled] = useState(false);
      const [copied, setCopied] = useState(false);

      useEffect(() => {
        const handleScroll = () => {
          setIsScrolled(window.scrollY > 50);
          
          const sections = ['home', 'about', 'research', 'collaborations', 'personal'];
          const current = sections.find(section => {
            const element = document.getElementById(section);
            if (element) {
              const rect = element.getBoundingClientRect();
              return rect.top >= -100 && rect.top <= 300;
            }
            return false;
          });
          if (current) setActiveSection(current);
        };

        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const scrollTo = (id) => {
        const element = document.getElementById(id);
        if (element) {
          element.scrollIntoView({ behavior: 'smooth' });
        }
      };

      const navLinks = [
        { id: 'about', label: 'About' },
        { id: 'research', label: 'Research' },
        { id: 'collaborations', label: 'Collaborations' },
        { id: 'personal', label: 'Beyond Research' },
      ];

      const handleEmailClick = (e) => {
        // Copy to clipboard
        const email = "devang.bhagat@louisville.edu";
        
        // Use modern clipboard API if available, else fallback
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(email);
        } else {
            const textArea = document.createElement("textarea");
            textArea.value = email;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea);
        }
        
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-900 selection:bg-indigo-100 selection:text-indigo-900">
          
          {/* Navigation */}
             <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white/80 backdrop-blur-md shadow-sm py-3' : 'bg-transparent py-5'}`}>
            <div className="max-w-6xl mx-auto px-6 flex justify-between items-center">
              <button onClick={() => scrollTo('home')} className="text-xl font-bold tracking-tight text-slate-900 flex items-center gap-2">
                <Atom className="w-6 h-6 text-indigo-600" />
                Devang Bhagat
              </button>
              <div className="hidden md:flex gap-8 text-sm font-medium">
                {navLinks.map((link) => (
                  <button
                    key={link.id}
                    onClick={() => scrollTo(link.id)}
                    className={`transition-colors hover:text-indigo-600 ${activeSection === link.id ? 'text-indigo-600' : 'text-slate-600'}`}
                  >
                    {link.label}
                  </button>
                ))}
              </div>
              <a 
                href="./assets/resume.pdf" 
                target="_blank" 
                rel="noreferrer"
                className="hidden md:flex items-center gap-2 bg-slate-900 text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-800 transition-colors"
              >
                <FileText className="w-4 h-4" />
                Download CV
              </a>
            </div>
          </nav>

             {/* Hero Section */}
          <section id="home" className="pt-32 pb-20 md:pt-48 md:pb-32 px-6 max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-12">
            <div className="flex-1 space-y-6">
              <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-50 text-indigo-700 text-sm font-semibold mb-2">
                <span className="relative flex h-2 w-2">
                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                  <span className="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
                </span>
                Ph.D. Candidate @ University of Louisville
              </div>
              <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight text-slate-900 leading-tight">
                Hi, I'm <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-blue-500">Devang Bhagat.</span>
              </h1>
              <p className="text-lg md:text-xl text-slate-600 max-w-2xl leading-relaxed">
                I explore how defects in quantum perovskites impact materials for next-gen computing using electronic structure calculations, machine learning, and molecular dynamics.
              </p>
              <div className="flex flex-wrap gap-4 pt-4">
                <a 
                  href="mailto:devang.bhagat@louisville.edu"
                  onClick={handleEmailClick}
                  className="flex items-center gap-2 w-44 justify-center bg-indigo-600 text-white px-6 py-3 rounded-full font-medium hover:bg-indigo-700 transition-colors shadow-sm shadow-indigo-200"
                >
                  <Mail className="w-5 h-5" />
                  {copied ? "Copied!" : "Get in touch"}
                </a>
                <button 
                  onClick={() => scrollTo('research')}

                >
                  View Research <ArrowDown className="w-4 h-4" />
                </button>
              </div>
            </div>
            <div className="w-64 h-64 md:w-96 md:h-96 relative shrink-0">
              <div className="absolute inset-0 bg-gradient-to-tr from-indigo-100 to-blue-50 rounded-[2rem] transform rotate-3"></div>
              <img 
                src="./assets/profile.JPG" 
                alt="Devang Bhagat" 
                className="absolute inset-0 w-full h-full object-cover rounded-[2rem] shadow-xl border-4 border-white transform -rotate-3 transition-transform hover:rotate-0 duration-500"
                onError={(e) => { e.target.src = 'https://ui-avatars.com/api/?name=Devang+Bhagat&size=512&background=e0e7ff&color=4f46e5' }}
              />
            </div>
          </section>

          {/* About Section */}
          <section id="about" className="py-20 bg-white">
            <div className="max-w-6xl mx-auto px-6">
              <div className="flex items-center gap-4 mb-12">
                <h2 className="text-3xl font-bold text-slate-900">About Me</h2>
                <div className="h-px bg-slate-200 flex-1"></div>
              </div>
              
              <div className="grid md:grid-cols-3 gap-12">
                <div className="md:col-span-2 space-y-6 text-lg text-slate-600 leading-relaxed">
                  <p>
                    I am currently a Ph.D. candidate at the University of Louisville. My research is primarily focused on understanding the fundamental properties of quantum materials and how specific defects can be leveraged to engineer next-generation computing architectures.
                  </p>
                  <p>
                    My methodology bridges multiple computational disciplines. I utilize a synergistic approach combining <strong>Density Functional Theory (DFT)</strong>, <strong>Machine Learning (ML)</strong> models, and <strong>Molecular Dynamics (MD)</strong> simulations to systematically study phase transitions, electronic properties, and metal-insulator transitions at the atomic scale.
                  </p>
                </div>
                
                <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 h-fit">
                  <h3 className="font-semibold text-slate-900 mb-4 flex items-center gap-2">
                    <Atom className="w-5 h-5 text-indigo-500" /> Core Methodologies
                  </h3>
                  <ul className="space-y-3">
                    {['Electronic Structure Calculations', 'Machine Learning Models', 'Molecular Dynamics (MD)', 'Density Functional Theory (DFT)', 'Wannier Analysis','LOBSTER Analysis'].map((skill) => (
                      <li key={skill} className="flex items-start gap-2 text-sm text-slate-700">
                        <ChevronRight className="w-4 h-4 text-indigo-400 mt-0.5 shrink-0" />
                        {skill}
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            </div>
          </section>

          {/* Primary Research Section */}
          <section id="research" className="py-20">
            <div className="max-w-6xl mx-auto px-6">
              <div className="flex items-center gap-4 mb-12">
                <h2 className="text-3xl font-bold text-slate-900">Primary Research</h2>
                <div className="h-px bg-slate-200 flex-1"></div>
              </div>

              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                {/* Project 1 */}
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-shadow group flex flex-col">
                  <div className="h-48 overflow-hidden relative">
                    <img 
                      src="./assets/project_1.jpg" 
                      alt="Perovskites" 
                      className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                      onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1614729939124-032f0b56c9ce?auto=format&fit=crop&q=80&w=800' }}
                    />
                    <div className="absolute top-4 right-4 bg-emerald-100 text-emerald-700 text-xs font-bold px-3 py-1 rounded-full shadow-sm">
                      Submitted
                    </div>
                  </div>
                  <div className="p-6 flex flex-col flex-1">
                    <h3 className="text-xl font-bold text-slate-900 mb-3 leading-tight">Role of Rare Earth in vacancy ordered RNiO<sub className="text-sm">3</sub> perovskites</h3>
                    <p className="text-slate-600 text-sm mb-6 flex-1">
                      Studying defect-induced phase transitions using advanced electronic structure calculations to understand atomic-level behavior.
                    </p>
                    <a 
                      href="https://arxiv.org/pdf/2412.19700" 
                      target="_blank" 
                      rel="noreferrer"
                      className="inline-flex items-center gap-2 text-indigo-600 font-semibold text-sm hover:text-indigo-700"
                    >
                      Read Paper on arXiv <ExternalLink className="w-4 h-4" />
                    </a>
                  </div>
                </div>

                {/* Project 2 */}
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-shadow group flex flex-col">
                  <div className="h-48 overflow-hidden relative">
                    <img 
                      src="./assets/project_2.png" 
                      alt="B site Perovskites" 
                      className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                      onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=800' }}
                    />
                    <div className="absolute top-4 right-4 bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full shadow-sm">
                      Ongoing
                    </div>
                  </div>
                  <div className="p-6 flex flex-col flex-1">
                    <h3 className="text-xl font-bold text-slate-900 mb-3 leading-tight">Role of B site in RBO<sub className="text-sm">3±δ</sub> perovskites</h3>
                    <p className="text-slate-600 text-sm mb-6 flex-1">
                      Systematic DFT analysis to study the effects of B site variations on metal-insulator transitions in complex oxide materials.
                    </p>
                  </div>
                </div>

                

                 {/* Project 3 */}
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-shadow group flex flex-col">
                  <div className="h-48 overflow-hidden relative bg-slate-100 flex items-center justify-center">
                    <img 
                      src="./assets/project_4.png" 
                      alt="Pseudocapacitive properties" 
                      className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                      onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1507413245164-6160d8298b31?auto=format&fit=crop&q=80&w=800' }}
                    />
                    <div className="absolute top-4 right-4 bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full shadow-sm">
                      Ongoing
                    </div>
                  </div>
                  <div className="p-6 flex flex-col flex-1">
                    <h3 className="text-xl font-bold text-slate-900 mb-3 leading-tight">Machine Learning Force Fields for Quantum Perovskites</h3>
                    <p className="text-slate-600 text-sm mb-6 flex-1">
                      Developing robust neural network interatomic potentials (NNPs) specifically for quantum perovskite materials.
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* Collaborations Section */}
          <section id="collaborations" className="py-20 bg-slate-900 text-white">
            <div className="max-w-6xl mx-auto px-6">
              <div className="flex items-center gap-4 mb-12">
                <h2 className="text-3xl font-bold text-white">Collaborative Research</h2>
                <div className="h-px bg-slate-700 flex-1"></div>
              </div>

              <div className="grid md:grid-cols-2 gap-8">
                {/* Collab 1 */}
                <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 flex flex-col md:flex-row gap-6 hover:bg-slate-800/80 transition-colors">
                  <div className="w-full md:w-1/3 h-40 shrink-0 rounded-xl overflow-hidden bg-slate-700 relative">
                    <img 
                      src="./assets/collab_1.png" 
                      alt="Li-ion batteries" 
                      className="w-full h-full object-cover"
                      onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1593941707882-a5bba14938c7?auto=format&fit=crop&q=80&w=500' }}
                    />
                  </div>
                  <div className="flex-1">
                    <div className="inline-block px-2 py-1 bg-slate-700 text-slate-300 text-xs font-semibold rounded mb-3">
                      w/ Argonne & ORNL
                    </div>
                    <h3 className="text-lg font-bold mb-2">Electronic properties of Lithium ion batteries</h3>
                    <p className="text-slate-400 text-sm">
                      Understanding variation in oxidation states of Ni/Co in CoO2 and NiO2 with Li-intercalation, using DFT and Wannier analysis, in collaboration with RXES experiments.
                    </p>
                  </div>
                </div>

                {/* Collab 2 */}
                <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 flex flex-col md:flex-row gap-6 hover:bg-slate-800/80 transition-colors">
                  <div className="w-full md:w-1/3 h-40 shrink-0 rounded-xl overflow-hidden bg-slate-700 relative">
                    <img 
                      src="./assets/collab_2.png" 
                      alt="2D Materials" 
                      className="w-full h-full object-cover"
                      onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=500' }}
                    />
                  </div>
                  <div className="flex-1">
                    <div className="inline-block px-2 py-1 bg-slate-700 text-slate-300 text-xs font-semibold rounded mb-3">
                      Under Review
                    </div>
                    <h3 className="text-lg font-bold mb-2">Nanoribbons Formation in Arsenic-Black Phosphorous Alloys</h3>
                    <p className="text-slate-400 text-sm">
                      Developing an atomic-scale understanding of defect energies in Black Phosphorous materials to evaluate their potential for advanced applications.
                    </p>
                  </div>
                  
                </div>
                  {/* Collab 3 */}
                <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 flex flex-col md:flex-row gap-6 hover:bg-slate-800/80 transition-colors">
                  <div className="w-full md:w-1/3 h-40 shrink-0 rounded-xl overflow-hidden bg-slate-700 relative">
                    <img 
                      src="./assets/collab_3.png" 
                      alt="2D Materials" 
                      className="w-full h-full object-cover"
                      onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=500' }}
                    />
                  </div>
                  <div className="flex-1">
                    <div className="inline-block px-2 py-1 bg-slate-700 text-slate-300 text-xs font-semibold rounded mb-3">
                      Manuscript preparation
                    </div>
                    <h3 className="text-lg font-bold mb-2">A review of Group VA Nanoribbons</h3>
                    <p className="text-slate-400 text-sm">
                      Summarizing recent theoretical and experimental progress on Group VA elemental nanoribbons, with a focus on how edge-states and quantum confinement drive their potential in advanced optoelectronic and energy conversion applications.
                    </p>
                  </div>
                  
                </div>
                                  {/* Collab 4 */}
                <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 flex flex-col md:flex-row gap-6 hover:bg-slate-800/80 transition-colors">
                  <div className="w-full md:w-1/3 h-40 shrink-0 rounded-xl overflow-hidden bg-slate-700 relative">
                    <img 
                      src="./assets/project_3.png" 
                      alt="2D Materials" 
                      className="w-full h-full object-cover"
                      onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=500' }}
                    />
                  </div>
                  <div className="flex-1">
                    <div className="inline-block px-2 py-1 bg-slate-700 text-slate-300 text-xs font-semibold rounded mb-3">
                      Manuscript preparation
                    </div>
                    <h3 className="text-lg font-bold mb-2">Pseudocapacitive properties of LaMnO<sub className="text-sm">3</sub> & SrMnO<sub className="text-sm">3</sub></h3>
                    <p className="text-slate-400 text-sm">
                      Investigating pseudocapacitive properties utilizing diffusion barrier techniques and corroborating theoretical models with experimental results.
                    </p>
                  </div>
                  
                </div>
              </div>
            </div>
          </section>

          {/* Beyond Research Section */}
          <section id="personal" className="py-20 bg-white">
            <div className="max-w-6xl mx-auto px-6">
              <div className="flex items-center gap-4 mb-12">
                <h2 className="text-3xl font-bold text-slate-900">Beyond Research</h2>
                <div className="h-px bg-slate-200 flex-1"></div>
              </div>

              <div className="grid md:grid-cols-2 gap-12">
                <div>
                  <p className="text-slate-600 mb-8 leading-relaxed">
                    When I'm not running simulations or compiling code, I love exploring the outdoors and local culture. In fact, I'm so passionate about discovering great local food that I built and maintain a website dedicated to it: <a href="https://aroundtheville.com" target="_blank" rel="noreferrer" className="text-indigo-600 font-semibold hover:underline">aroundtheville.com</a>.
                  </p>
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-slate-50 rounded-xl p-4 flex items-center gap-3 border border-slate-100">
                      <Map className="w-6 h-6 text-indigo-500" />

                    <div className="bg-slate-50 rounded-xl p-4 flex items-center gap-3 border border-slate-100">

                  <div className="flex gap-6 items-start">
                    <div className="w-24 shrink-0 rounded shadow-md overflow-hidden">
                      <img 
                        src="./assets/book.jpg"

                        className="w-full h-auto"
                        onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&q=80&w=200' }}
                      />
                    </div>
                    <div>

                </div>
              </div>

              <h2 className="text-2xl font-bold text-white mb-6">Let's Connect</h2>
              <p className="mb-8 max-w-xl mx-auto">
                I am currently seeking postdoctoral opportunities where I can apply my expertise in computational materials science to solve complex energy and computing challenges.
              </p>
          <div className="flex justify-center gap-4 mb-12">
            <a 
              href="mailto:devang.bhagat@louisville.edu"
              onClick={handleEmailClick}
              className="px-6 py-3 w-44 justify-center bg-white text-slate-900 rounded-full font-semibold hover:bg-slate-200 transition-colors inline-flex items-center gap-2"
            >
              <Mail className="w-4 h-4" /> 
              {copied ? "Email Copied!" : "Email Me"}
            </a>
            <a 
              href="./assets/resume.pdf"
                  target="_blank"
                  rel="noreferrer"
                  className="px-6 py-3 border border-slate-700 text-white rounded-full font-semibold hover:bg-slate-800 transition-colors inline-flex items-center gap-2"

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
